<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balloon</title>

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

#balloon{
    width:200px;
    height:200px;
    background:red;
    border-radius:50%;
}
</style>
</head>

<body>

<div id="balloon"></div>

<script>
let b = document.getElementById("balloon");

let size = 200;
let colors = ["red","green","blue"];
let i = 0;

/* CLICK */
b.onclick = function(){

    size += 10;

    if(size > 420){
        size = 200;
        i = 0;
    } else {
        i = (i + 1) % 3;
    }

    b.style.width = size + "px";
    b.style.height = size + "px";
    b.style.background = colors[i];
};

/* MOUSE LEAVE */
b.onmouseleave = function(){

    size -= 5;
    if(size < 200) size = 200;

    i = (i - 1 + 3) % 3;

    b.style.width = size + "px";
    b.style.height = size + "px";
    b.style.background = colors[i];
};
</script>

</body>
</html>
